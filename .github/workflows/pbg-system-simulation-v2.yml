name: pbg-system-simulation-v2

on:
  pull_request:
    paths:
      - '.github/workflows/pbg-system-simulation-v2.yml'
      - 'fixtures/plan-build-grow/**'
      - 'fixtures/tests/a1-assessment-quiz.proof.json'
      - 'engine/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  simulate-pbg-system:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enable corepack
        run: corepack enable

      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip reportlab python-pptx pypdf pillow lxml

      - name: Contract tests
        run: pnpm test

      - name: Full test suite
        run: pnpm run test:all

      - name: Audit output contracts
        run: node scripts/audit-output-contracts.mjs

      - name: Coverage report
        run: pnpm run qa:coverage-report

      - name: Math 8 v2 schema
        run: pnpm run schema:check -- --package fixtures/plan-build-grow/pbg_math8_complete_coverage_addon_v2.json

      - name: Math 8 v2 route plan
        run: pnpm run route:plan -- --package fixtures/plan-build-grow/pbg_math8_complete_coverage_addon_v2.json --print-routes

      - name: Math 8 v2 render
        run: pnpm run render:package -- --package fixtures/plan-build-grow/pbg_math8_complete_coverage_addon_v2.json --out output

      - name: Math 8 v2 bundle QA
        run: pnpm run qa:bundle -- --package fixtures/plan-build-grow/pbg_math8_complete_coverage_addon_v2.json --out output

      - name: Science 8 schema
        run: pnpm run schema:check -- --package fixtures/plan-build-grow/pbg_science8_ecosystems_garden_addon.json

      - name: Science 8 route plan
        run: pnpm run route:plan -- --package fixtures/plan-build-grow/pbg_science8_ecosystems_garden_addon.json --print-routes

      - name: Science 8 render
        run: pnpm run render:package -- --package fixtures/plan-build-grow/pbg_science8_ecosystems_garden_addon.json --out output

      - name: Science 8 bundle QA
        run: pnpm run qa:bundle -- --package fixtures/plan-build-grow/pbg_science8_ecosystems_garden_addon.json --out output

      - name: ELA 8 v2 schema
        run: pnpm run schema:check -- --package fixtures/plan-build-grow/pbg_ela8_community_garden_evidence_addon_v2.json

      - name: ELA 8 v2 route plan
        run: pnpm run route:plan -- --package fixtures/plan-build-grow/pbg_ela8_community_garden_evidence_addon_v2.json --print-routes

      - name: ELA 8 v2 render
        run: pnpm run render:package -- --package fixtures/plan-build-grow/pbg_ela8_community_garden_evidence_addon_v2.json --out output

      - name: ELA 8 v2 bundle QA
        run: pnpm run qa:bundle -- --package fixtures/plan-build-grow/pbg_ela8_community_garden_evidence_addon_v2.json --out output

      - name: Assessment proof render
        run: pnpm run render:package -- --package fixtures/tests/a1-assessment-quiz.proof.json --out output

      - name: Assessment answer-leak QA
        run: pnpm run qa:assessment-answer-leak -- --package fixtures/tests/a1-assessment-quiz.proof.json --out output

      - name: Assessment proof bundle QA
        run: pnpm run qa:bundle -- --package fixtures/tests/a1-assessment-quiz.proof.json --out output

      - name: Upload simulation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pbg-system-simulation-v2-output
          path: output
          if-no-files-found: ignore
