name: pbg-system-simulation-v2

on:
  pull_request:
    paths:
      - '.github/workflows/pbg-system-simulation-v2.yml'
      - 'fixtures/plan-build-grow/**'
      - 'fixtures/tests/a1-assessment-quiz.proof.json'
      - 'engine/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  simulate-pbg-system:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enable corepack
        run: corepack enable

      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip pytest reportlab python-pptx pypdf pillow lxml

      - name: Math 8 v2 schema diagnostic
        run: pnpm run schema:check -- --package fixtures/plan-build-grow/pbg_math8_complete_coverage_addon_v2.json

      - name: Math 8 v2 route plan diagnostic
        run: pnpm run route:plan -- --package fixtures/plan-build-grow/pbg_math8_complete_coverage_addon_v2.json --print-routes

      - name: Math 8 v2 render diagnostic
        run: pnpm run render:package -- --package fixtures/plan-build-grow/pbg_math8_complete_coverage_addon_v2.json --out output

      - name: List Math 8 output files before QA
        if: always()
        run: find output -maxdepth 3 -type f | sort || true

      - name: Math 8 v2 bundle QA diagnostic
        run: pnpm run qa:bundle -- --package fixtures/plan-build-grow/pbg_math8_complete_coverage_addon_v2.json --out output

      - name: Upload simulation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pbg-system-simulation-v2-output
          path: output
          if-no-files-found: ignore
