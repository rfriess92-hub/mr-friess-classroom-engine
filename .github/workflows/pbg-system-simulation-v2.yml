name: pbg-system-simulation-v2

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/pbg-system-simulation-v2.yml'
      - 'fixtures/plan-build-grow/**'
      - 'fixtures/tests/a1-assessment-quiz.proof.json'
      - 'engine/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  simulate-pbg-system:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enable corepack
        run: corepack enable

      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip pytest reportlab python-pptx pypdf pillow lxml

      - name: Apply simulation fixture hotfixes
        run: node scripts/pbg-simulation-hotfix.mjs

      - name: Run full PBG system simulation
        shell: bash
        run: |
          set +e
          STATUS=0
          mkdir -p output simulation-reports
          echo "# PBG system simulation v2" > simulation-reports/summary.md
          echo "" >> simulation-reports/summary.md

          run_check() {
            local name="$1"
            shift
            local slug
            slug=$(echo "$name" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '-' | sed 's/^-//;s/-$//')
            local log_file="simulation-reports/${slug}.log"

            echo ""
            echo "===== ${name} ====="
            echo "COMMAND: $*"

            "$@" > "${log_file}" 2>&1
            local code=$?

            if [ "${code}" -eq 0 ]; then
              echo "PASS: ${name}"
              echo "- PASS: ${name}" >> simulation-reports/summary.md
            else
              echo "FAIL: ${name} (exit ${code})"
              echo "----- tail ${log_file} -----"
              tail -n 120 "${log_file}" || true
              echo "----- end tail ${log_file} -----"
              echo "- FAIL: ${name} (exit ${code})" >> simulation-reports/summary.md
              STATUS=1
            fi

            return 0
          }

          PACKAGES=(
            "fixtures/plan-build-grow/pbg_math8_complete_coverage_addon_v2.json"
            "fixtures/plan-build-grow/pbg_science8_ecosystems_garden_addon.json"
            "fixtures/plan-build-grow/pbg_ela8_community_garden_evidence_addon_v2.json"
            "fixtures/tests/a1-assessment-quiz.proof.json"
          )

          for package_path in "${PACKAGES[@]}"; do
            package_name=$(basename "${package_path}" .json)
            echo "" >> simulation-reports/summary.md
            echo "## ${package_name}" >> simulation-reports/summary.md

            run_check "${package_name} schema" pnpm run schema:check -- --package "${package_path}"
            run_check "${package_name} route plan" pnpm run route:plan -- --package "${package_path}" --print-routes
            run_check "${package_name} render package" pnpm run render:package -- --package "${package_path}" --out output
            run_check "${package_name} bundle QA" pnpm run qa:bundle -- --package "${package_path}" --out output
            run_check "${package_name} answer-leak QA" pnpm run qa:assessment-answer-leak -- --package "${package_path}" --out output
            run_check "${package_name} QA report" pnpm run qa:report -- --package "${package_path}" --out output
          done

          echo "" >> simulation-reports/summary.md
          echo "## Repo-level checks" >> simulation-reports/summary.md
          run_check "stable node tests" pnpm test
          run_check "python tests" python -m pytest tests/python
          run_check "output contract audit" node scripts/audit-output-contracts.mjs
          run_check "coverage report" pnpm run qa:coverage-report

          echo "" >> simulation-reports/summary.md
          echo "## Failures" >> simulation-reports/summary.md
          grep '^- FAIL:' simulation-reports/summary.md > simulation-reports/failures.md || true
          if [ -s simulation-reports/failures.md ]; then
            cat simulation-reports/failures.md >> simulation-reports/summary.md
          else
            echo "- none" >> simulation-reports/summary.md
          fi

          echo "" >> simulation-reports/summary.md
          echo "## Rendered files" >> simulation-reports/summary.md
          find output -maxdepth 4 -type f | sort > simulation-reports/rendered-files.txt
          sed 's/^/- /' simulation-reports/rendered-files.txt >> simulation-reports/summary.md

          echo ""
          echo "===== COMPACT SIMULATION SUMMARY ====="
          sed -n '1,/^## Rendered files$/p' simulation-reports/summary.md
          echo "===== END COMPACT SIMULATION SUMMARY ====="

          exit "${STATUS}"

      - name: Upload simulation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pbg-system-simulation-v2-output
          path: |
            output
            simulation-reports
          if-no-files-found: ignore
