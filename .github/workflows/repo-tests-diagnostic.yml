name: repo-tests-diagnostic

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/repo-tests-diagnostic.yml'
      - 'tests/**'
      - 'fixtures/**'
      - 'courses/**'
      - 'school-year/**'
      - 'engine/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/repo-tests-diagnostic.yml'
      - 'tests/**'
      - 'fixtures/**'
      - 'courses/**'
      - 'school-year/**'
      - 'engine/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  test-diagnostic:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack
        run: corepack enable

      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run core node tests to file
        id: node_tests
        continue-on-error: true
        run: pnpm test > test-output.log 2>&1

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-test-output
          path: test-output.log
          if-no-files-found: error

      - name: Fail if tests failed
        if: steps.node_tests.outcome != 'success'
        run: exit 1
