name: agent-governance

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/agent-governance.yml'
      - 'agents/**'
      - 'contracts/**'
      - 'roadmap/**'
      - 'scripts/agent/**'
      - 'scripts/**/*.mjs'
      - 'tests/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/agent-governance.yml'
      - 'agents/**'
      - 'contracts/**'
      - 'roadmap/**'
      - 'scripts/agent/**'
      - 'scripts/**/*.mjs'
      - 'tests/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  agent-governance:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack
        run: corepack enable

      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Check phase agent scaffold
        run: pnpm run agent:phase-check

      - name: Check QA agent scaffold
        run: pnpm run agent:qa-check

      - name: Run core node tests
        run: pnpm test
