name: classroom-toolkit-render

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/classroom-toolkit-render.yml'
      - 'engine/pdf-html/render.mjs'
      - 'engine/pdf-html/templates/classroom-toolkit-templates.mjs'
      - 'fixtures/generated/classroom-toolkit-sample.grade8-all.json'
      - 'fixtures/tests/classroom-toolkit-central-routing.proof.json'
      - 'scripts/render-classroom-toolkit-sample.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  render-classroom-toolkit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enable corepack
        run: corepack enable

      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip reportlab python-pptx pypdf pillow lxml

      - name: Render direct classroom toolkit sample
        run: |
          set -euo pipefail
          node scripts/render-classroom-toolkit-sample.mjs \
            --package fixtures/generated/classroom-toolkit-sample.grade8-all.json \
            --out output/classroom-toolkit-sample/direct

      - name: Render central routed classroom toolkit proof package
        run: |
          set -euo pipefail
          PACKAGE=fixtures/tests/classroom-toolkit-central-routing.proof.json
          pnpm run schema:check -- --package "$PACKAGE"
          pnpm run route:plan -- --package "$PACKAGE" --print-routes
          pnpm run render:package -- --package "$PACKAGE" --out output/classroom-toolkit-sample/central
          pnpm run qa:bundle -- --package "$PACKAGE" --out output/classroom-toolkit-sample/central

      - name: List rendered docs
        run: find output/classroom-toolkit-sample -type f | sort

      - name: Upload classroom toolkit sample docs
        uses: actions/upload-artifact@v4
        with:
          name: classroom-toolkit-sample-docs
          path: output/classroom-toolkit-sample
          if-no-files-found: error
