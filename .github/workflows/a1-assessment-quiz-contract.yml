name: a1-assessment-quiz-render

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/a1-assessment-quiz-contract.yml'
      - 'docs/assessment-quiz-render-contract.md'
      - 'engine/pdf-html/render.mjs'
      - 'engine/pdf-html/templates/assessment-quiz.mjs'
      - 'engine/pdf-html/templates/answer-key.mjs'
      - 'fixtures/tests/a1-assessment-quiz.proof.json'
      - 'scripts/render-package.mjs'
      - 'schemas/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  assessment-quiz-render:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enable corepack
        run: corepack enable

      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip reportlab python-pptx pypdf pillow lxml

      - name: Verify schema, route planning, and render pass
        run: |
          set -euo pipefail
          PACKAGE=fixtures/tests/a1-assessment-quiz.proof.json
          pnpm run schema:check -- --package "$PACKAGE"
          pnpm run route:plan -- --package "$PACKAGE" --print-routes
          pnpm run render:package -- --package "$PACKAGE" --out output/a1-assessment-quiz-render

      - name: Assert assessment, quiz, and marking guide artifacts exist
        run: |
          set -euo pipefail
          ROOT=output/a1-assessment-quiz-render/a1_assessment_quiz_proof
          test -f "$ROOT/reaction_evidence_quiz.pdf"
          test -f "$ROOT/reaction_evidence_assessment.pdf"
          test -f "$ROOT/reaction_evidence_quiz_marking_guide.pdf"
          test -f "$ROOT/reaction_evidence_assessment_marking_guide.pdf"

      - name: List rendered docs
        run: find output/a1-assessment-quiz-render -type f | sort

      - name: Upload assessment quiz render docs
        uses: actions/upload-artifact@v4
        with:
          name: a1-assessment-quiz-render-docs
          path: output/a1-assessment-quiz-render
          if-no-files-found: error
