name: lwd-render-artifacts

on:
  push:
    branches:
      - content/lwd-elevator-floors-unit
    paths:
      - '.github/workflows/lwd-render-artifacts.yml'
      - 'fixtures/generated/lwd-elevator-4day.grade8-ela.json'
      - 'engine/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  render-lwd:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enable corepack
        run: corepack enable

      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip reportlab python-pptx pypdf pillow lxml

      - name: Render Long Way Down package
        run: |
          set -euo pipefail
          PACKAGE=fixtures/generated/lwd-elevator-4day.grade8-ela.json
          pnpm run schema:check -- --package "$PACKAGE"
          pnpm run route:plan -- --package "$PACKAGE" --print-routes
          pnpm run render:package -- --package "$PACKAGE" --out output

      - name: List rendered artifacts
        run: find output -type f | sort

      - name: Upload rendered Long Way Down artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lwd-rendered-artifacts
          path: output
          if-no-files-found: error
