name: sample-output-review

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/sample-output-review.yml'
      - 'engine/**'
      - 'fixtures/**'
      - 'scripts/**'
      - 'schemas/**'
      - 'tests/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  sample-output-review:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enable corepack
        run: corepack enable

      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip reportlab python-pptx pypdf pillow lxml

      - name: Run contract and unit checks
        run: |
          pnpm run doctor
          pnpm test
          node scripts/audit-output-contracts.mjs

      - name: Render representative sample packages
        run: |
          set -euo pipefail
          mkdir -p output-samples

          echo '=== friess-classroom-slides ==='
          pnpm run schema:check -- --package fixtures/tests/friess-classroom-slides.proof.json
          pnpm run route:plan -- --package fixtures/tests/friess-classroom-slides.proof.json --print-routes
          pnpm run render:package -- --package fixtures/tests/friess-classroom-slides.proof.json --out output-samples/friess-classroom-slides --flat-out
          pnpm run qa:bundle -- --package fixtures/tests/friess-classroom-slides.proof.json --out output-samples/friess-classroom-slides --flat-dir

          echo '=== mr-friess-engine-docs ==='
          pnpm run schema:check -- --package fixtures/tests/mr-friess-engine-docs.proof.json
          pnpm run route:plan -- --package fixtures/tests/mr-friess-engine-docs.proof.json --print-routes
          pnpm run render:package -- --package fixtures/tests/mr-friess-engine-docs.proof.json --out output-samples/mr-friess-engine-docs --flat-out

          echo '=== worksheet-template-system ==='
          pnpm run schema:check -- --package fixtures/tests/worksheet-template-system.proof.json
          pnpm run route:plan -- --package fixtures/tests/worksheet-template-system.proof.json --print-routes
          pnpm run render:package -- --package fixtures/tests/worksheet-template-system.proof.json --out output-samples/worksheet-template-system --flat-out

          echo '=== station-rotation-graphic-organizer ==='
          pnpm run schema:check -- --package fixtures/tests/station-rotation-graphic-organizer.proof.json
          pnpm run route:plan -- --package fixtures/tests/station-rotation-graphic-organizer.proof.json --print-routes
          pnpm run render:package -- --package fixtures/tests/station-rotation-graphic-organizer.proof.json --out output-samples/station-rotation-graphic-organizer
          pnpm run qa:bundle -- --package fixtures/tests/station-rotation-graphic-organizer.proof.json --out output-samples/station-rotation-graphic-organizer

          echo '=== benchmark1 ==='
          pnpm run schema:check -- --fixture benchmark1
          pnpm run route:plan -- --fixture benchmark1 --print-routes
          pnpm run render:package -- --fixture benchmark1 --out output-samples/benchmark1
          pnpm run qa:bundle -- --fixture benchmark1 --out output-samples/benchmark1

          echo '=== pbg_english10 ==='
          pnpm run schema:check -- --fixture pbg_english10
          pnpm run route:plan -- --fixture pbg_english10 --print-routes
          pnpm run render:package -- --fixture pbg_english10 --out output-samples/pbg_english10

          echo '=== pbg_math8 ==='
          pnpm run schema:check -- --fixture pbg_math8
          pnpm run route:plan -- --fixture pbg_math8 --print-routes
          pnpm run render:package -- --fixture pbg_math8 --out output-samples/pbg_math8

          echo '=== pbg_workplace_math10 ==='
          pnpm run schema:check -- --fixture pbg_workplace_math10
          pnpm run route:plan -- --fixture pbg_workplace_math10 --print-routes
          pnpm run render:package -- --fixture pbg_workplace_math10 --out output-samples/pbg_workplace_math10

      - name: Write sample output manifest
        if: always()
        run: |
          mkdir -p output-samples
          {
            echo '# Sample Output Review Manifest'
            echo
            echo 'Generated by `.github/workflows/sample-output-review.yml`.'
            echo
            echo '## Files'
            echo
            find output-samples -type f | sort | while read -r file; do
              bytes=$(wc -c < "$file" | tr -d ' ')
              echo "- ${file} (${bytes} bytes)"
            done
            echo
            echo '## QA summaries'
            echo
            find output-samples -name 'package.qa.json' -type f | sort | while read -r qa; do
              echo "### ${qa}"
              echo '```json'
              cat "$qa"
              echo
              echo '```'
              echo
            done
          } | tee output-samples/SAMPLE_OUTPUT_MANIFEST.md

      - name: Upload sample output evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sample-output-review
          path: output-samples
          if-no-files-found: error
