name: stable-core

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  stable-core:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enable corepack
        run: corepack enable

      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip reportlab python-pptx pypdf pillow lxml

      - name: Repo doctor
        run: pnpm run doctor

      - name: Contract tests
        run: pnpm test

      - name: Schema check benchmark fixture
        run: pnpm run schema:check -- --fixture benchmark1

      - name: Route plan benchmark fixture
        run: pnpm run route:plan -- --fixture benchmark1 --print-routes

      - name: Render benchmark fixture bundle
        run: pnpm run render:package -- --fixture benchmark1 --out output

      - name: Bundle QA benchmark fixture
        run: pnpm run qa:bundle -- --fixture benchmark1 --out output

      - name: Schema check multi-day fixture
        run: pnpm run schema:check -- --fixture challenge7

      - name: Route plan multi-day fixture
        run: pnpm run route:plan -- --fixture challenge7 --print-routes

      - name: Schema check evaluated assignment-family fixture
        run: pnpm run schema:check -- --package fixtures/generated/careers-8-career-clusters.grade8-careers.json

      - name: Route plan evaluated assignment-family fixture
        run: pnpm run route:plan -- --package fixtures/generated/careers-8-career-clusters.grade8-careers.json --print-routes

      - name: Schema check task-sheet response-pattern fixture
        run: pnpm run schema:check -- --package fixtures/tests/task-sheet-response-patterns.workshop-session.json

      - name: Route plan task-sheet response-pattern fixture
        run: pnpm run route:plan -- --package fixtures/tests/task-sheet-response-patterns.workshop-session.json --print-routes

      - name: Render task-sheet response-pattern fixture
        run: pnpm run render:package -- --package fixtures/tests/task-sheet-response-patterns.workshop-session.json --out output

      - name: Schema check seminar discussion-prep proof fixture
        run: pnpm run schema:check -- --package fixtures/tests/seminar-discussion-prep.proof.json

      - name: Route plan seminar discussion-prep proof fixture
        run: pnpm run route:plan -- --package fixtures/tests/seminar-discussion-prep.proof.json --print-routes

      - name: Render seminar discussion-prep proof fixture
        run: pnpm run render:package -- --package fixtures/tests/seminar-discussion-prep.proof.json --out output

      - name: Bundle QA seminar discussion-prep proof fixture
        run: pnpm run qa:bundle -- --package fixtures/tests/seminar-discussion-prep.proof.json --out output

      - name: Schema check station-rotation organizer proof fixture
        run: pnpm run schema:check -- --package fixtures/tests/station-rotation-graphic-organizer.proof.json

      - name: Route plan station-rotation organizer proof fixture
        run: pnpm run route:plan -- --package fixtures/tests/station-rotation-graphic-organizer.proof.json --print-routes

      - name: Render station-rotation organizer proof fixture
        run: pnpm run render:package -- --package fixtures/tests/station-rotation-graphic-organizer.proof.json --out output

      - name: Bundle QA station-rotation organizer proof fixture
        run: pnpm run qa:bundle -- --package fixtures/tests/station-rotation-graphic-organizer.proof.json --out output

      - name: Schema check PBG ELA 10 fixture
        run: pnpm run schema:check -- --fixture pbg_english10

      - name: Route plan PBG ELA 10 fixture
        run: pnpm run route:plan -- --fixture pbg_english10 --print-routes

      - name: Render PBG ELA 10 fixture
        run: pnpm run render:package -- --fixture pbg_english10 --out output

      - name: Schema check PBG Math 8 fixture
        run: pnpm run schema:check -- --fixture pbg_math8

      - name: Route plan PBG Math 8 fixture
        run: pnpm run route:plan -- --fixture pbg_math8 --print-routes

      - name: Render PBG Math 8 fixture
        run: pnpm run render:package -- --fixture pbg_math8 --out output

      - name: Schema check PBG Workplace Math 10 fixture
        run: pnpm run schema:check -- --fixture pbg_workplace_math10

      - name: Route plan PBG Workplace Math 10 fixture
        run: pnpm run route:plan -- --fixture pbg_workplace_math10 --print-routes

      - name: Render PBG Workplace Math 10 fixture
        run: pnpm run render:package -- --fixture pbg_workplace_math10 --out output

      - name: Simulation schema check Math 8 garden add-on
        run: pnpm run schema:check -- --package fixtures/plan-build-grow/pbg_math8_complete_coverage_addon.json

      - name: Simulation route plan Math 8 garden add-on
        run: pnpm run route:plan -- --package fixtures/plan-build-grow/pbg_math8_complete_coverage_addon.json --print-routes

      - name: Simulation render Math 8 garden add-on
        run: pnpm run render:package -- --package fixtures/plan-build-grow/pbg_math8_complete_coverage_addon.json --out output

      - name: Simulation bundle QA Math 8 garden add-on
        run: pnpm run qa:bundle -- --package fixtures/plan-build-grow/pbg_math8_complete_coverage_addon.json --out output

      - name: Simulation schema check Science 8 garden add-on
        run: pnpm run schema:check -- --package fixtures/plan-build-grow/pbg_science8_ecosystems_garden_addon.json

      - name: Simulation route plan Science 8 garden add-on
        run: pnpm run route:plan -- --package fixtures/plan-build-grow/pbg_science8_ecosystems_garden_addon.json --print-routes

      - name: Simulation render Science 8 garden add-on
        run: pnpm run render:package -- --package fixtures/plan-build-grow/pbg_science8_ecosystems_garden_addon.json --out output

      - name: Simulation bundle QA Science 8 garden add-on
        run: pnpm run qa:bundle -- --package fixtures/plan-build-grow/pbg_science8_ecosystems_garden_addon.json --out output

      - name: Simulation schema check ELA 8 garden add-on
        run: pnpm run schema:check -- --package fixtures/plan-build-grow/pbg_ela8_community_garden_evidence_addon.json

      - name: Simulation route plan ELA 8 garden add-on
        run: pnpm run route:plan -- --package fixtures/plan-build-grow/pbg_ela8_community_garden_evidence_addon.json --print-routes

      - name: Simulation render ELA 8 garden add-on
        run: pnpm run render:package -- --package fixtures/plan-build-grow/pbg_ela8_community_garden_evidence_addon.json --out output

      - name: Simulation bundle QA ELA 8 garden add-on
        run: pnpm run qa:bundle -- --package fixtures/plan-build-grow/pbg_ela8_community_garden_evidence_addon.json --out output

      - name: Simulation render assessment proof
        run: pnpm run render:package -- --package fixtures/tests/a1-assessment-quiz.proof.json --out output

      - name: Simulation answer-leak QA assessment proof
        run: pnpm run qa:assessment-answer-leak -- --package fixtures/tests/a1-assessment-quiz.proof.json --out output

      - name: Simulation bundle QA assessment proof
        run: pnpm run qa:bundle -- --package fixtures/tests/a1-assessment-quiz.proof.json --out output

      - name: Simulation coverage report
        run: pnpm run qa:coverage-report

      - name: Upload rendered bundle evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stable-core-output
          path: output
          if-no-files-found: ignore
