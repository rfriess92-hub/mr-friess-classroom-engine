name: Psychology Render QA

on:
  workflow_dispatch:
  push:

jobs:
  psychology-render-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: |
          node --version
          npm --version
          npm install -g pnpm@10.33.4
          pnpm --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python render dependencies
        run: |
          python --version
          python -m pip install --upgrade pip python-pptx

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm run fonts:install

      - name: Run Psychology source inventory
        run: pnpm run content:inventory

      - name: Run Psychology targeted tests
        run: |
          node --test \
            tests/node/psychology-source-inventory.test.mjs \
            tests/node/psychology-foundations-package.test.mjs \
            tests/node/psychology-foundations-render-proof.test.mjs \
            tests/node/psychology-foundations-route-plan.test.mjs \
            tests/node/psychology-foundations-assessment-route-plan.test.mjs \
            tests/node/psychology-foundations-slides-route-plan.test.mjs \
            tests/node/render-psychology-foundations-package-smoke.test.mjs \
            tests/node/render-psychology-foundations-assessment-smoke.test.mjs \
            tests/node/render-psychology-foundations-slides-smoke.test.mjs

      - name: Render Psychology Cycle A slide review artifacts
        run: node scripts/render-psychology-foundations-slides-review.mjs

      - name: Upload Psychology render artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: psychology-render-qa-artifacts
          path: |
            output/review/psychology-foundations-slides/**
            output/**/psychology_foundations_*.pdf
            output/**/psychology_foundations_*.pptx
            output/**/psychology_foundations_*.trace.json
            output/**/psychology_foundations_*.blocks.json
            output/**/psychology_foundations_*.grammar.json
            output/**/psychology_foundations_*.visual.json
          if-no-files-found: warn
          retention-days: 14
