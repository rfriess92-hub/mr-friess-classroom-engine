name: repo-tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/repo-tests.yml'
      - 'engine/**'
      - 'scripts/**'
      - 'tests/**'
      - 'fixtures/**'
      - 'packages/**'
      - 'courses/**'
      - 'school-year/**'
      - 'contracts/**'
      - 'schemas/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/repo-tests.yml'
      - 'engine/**'
      - 'scripts/**'
      - 'tests/**'
      - 'fixtures/**'
      - 'packages/**'
      - 'courses/**'
      - 'school-year/**'
      - 'contracts/**'
      - 'schemas/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack
        run: corepack enable

      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Run core node tests
        run: pnpm test
